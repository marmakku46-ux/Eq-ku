name: Android 31-Band Audio Compiler

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Clone Base Project
      run: |
        git clone https://github.com/android/audio-samples.git base_project
        cd base_project
        
    - name: Setup Java JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build APK Direct
      run: |
        cd base_project
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload Output APK
      uses: actions/upload-artifact@v4
      with:
        name: Equalizer-31Band-SiapPakai
        path: base_project/**/build/outputs/apk/debug/*.apk
