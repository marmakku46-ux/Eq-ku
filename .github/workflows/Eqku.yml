name: Android 31-Band Audio Compiler

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Ambil Repositori
      uses: actions/checkout@v4

    - name: Setup Java JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Buat Struktur Aplikasi Audio
      run: |
        mkdir -p app/src/main/java/com/diyaudio/equalizer31
        mkdir -p app/src/main/res/values
        
        # 1. Setup file utama gradle
        echo "include ':app'" > settings.gradle
        
        cat << 'EOF' > build.gradle
        buildscript {
            repositories { google(); mavenCentral() }
            dependencies { 
                classpath 'com.android.tools.build:gradle:8.2.2'
                classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.22'
            }
        }
        allprojects { repositories { google(); mavenCentral() } }
        EOF

        # 2. Setup modul aplikasi
        cat << 'EOF' > app/build.gradle
        plugins {
            id 'com.android.application'
            id 'org.jetbrains.kotlin.android'
        }
        android {
            namespace 'com.diyaudio.equalizer31'
            compileSdk 34
            defaultConfig {
                applicationId "com.diyaudio.equalizer31"
                minSdk 28
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
            buildFeatures { compose true }
            composeOptions { kotlinCompilerExtensionVersion '1.5.8' }
        }
        dependencies {
            implementation 'androidx.core:core-ktx:1.12.0'
            implementation 'androidx.activity:activity-compose:1.8.2'
            implementation platform('androidx.compose:compose-bom:2024.02.00')
            implementation 'androidx.compose.ui:ui'
            implementation 'androidx.compose.material3:material3'
        }
        EOF

        # 3. Izin Akses Audio Sistem Android
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />
            <application
                android:label="DSP Equalizer 31-Band"
                android:theme="@android:style/Theme.Material.NoActionBar">
                <activity
                    android:name=".MainActivity"
                    android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF

        # 4. Program Slider UI & Mesin Audio DSP 31-Band
        cat << 'EOF' > app/src/main/java/com/diyaudio/equalizer31/MainActivity.kt
        package com.diyaudio.equalizer31

        import android.os.Bundle
        import android.media.audiofx.DynamicsProcessing
        import android.util.Log
        import androidx.activity.ComponentActivity
        import androidx.activity.compose.setContent
        import androidx.compose.foundation.horizontalScroll
        import androidx.compose.foundation.layout.*
        import androidx.compose.foundation.rememberScrollState
        import androidx.compose.material3.*
        import androidx.compose.runtime.*
        import androidx.compose.ui.Alignment
        import androidx.compose.ui.Modifier
        import androidx.compose.ui.graphics.Color
        import androidx.compose.ui.graphics.TransformOrigin
        import androidx.compose.ui.graphics.graphicsLayer
        import androidx.compose.ui.layout.layout
        import androidx.compose.ui.unit.Constraints
        import androidx.compose.ui.unit.dp
        import androidx.compose.ui.unit.sp

        val ISO_31_BANDS = floatArrayOf(
            20f, 25f, 31.5f, 40f, 50f, 63f, 80f, 100f, 125f, 160f, 200f, 250f, 315f, 400f, 500f, 630f,
            800f, 1000f, 1250f, 1600f, 2000f, 2500f, 3150f, 4000f, 5000f, 6300f, 8000f, 10000f, 12500f, 16000f, 20000f
        )

        class MainActivity : ComponentActivity() {
            private var eqEngine: EqualizerEngine? = null

            override fun onCreate(savedInstanceState: Bundle?) {
                super.onCreate(savedInstanceState)
                eqEngine = EqualizerEngine(0)

                setContent {
                    MaterialTheme {
                        Surface(modifier = Modifier.fillMaxSize(), color = Color(0xFF121212)) {
                            EqualizerScreen(eqEngine)
                        }
                    }
                }
            }

            override fun onDestroy() {
                super.onDestroy()
                eqEngine?.release()
            }
        }

        class EqualizerEngine(audioSessionId: Int) {
            private var dynamicsProcessing: DynamicsProcessing? = null
            init {
                try {
                    val builder = DynamicsProcessing.Config.Builder(
                        DynamicsProcessing.VARIANT_FAVOR_FREQUENCY_RESOLUTION,
                        1, true, 31, false, 0, false, 0, true
                    )
                    dynamicsProcessing = DynamicsProcessing(audioSessionId, builder.build()).apply { enabled = true }
                    for (i in 0 until 31) {
                        val eqBand = DynamicsProcessing.EqBand(true, ISO_31_BANDS[i], 0f)
                        dynamicsProcessing?.setPreEqBandAllChannelsTo(i, eqBand)
                    }
                } catch (e: Exception) { 
                    Log.e("EQ31", "Gagal inisialisasi DSP", e) 
                }
            }
            fun setBandGain(bandIndex: Int, gainDb: Float) {
                try {
                    val eqBand = DynamicsProcessing.EqBand(true, ISO_31_BANDS[bandIndex], gainDb)
                    dynamicsProcessing?.setPreEqBandAllChannelsTo(bandIndex, eqBand)
                } catch (e: Exception) { 
                    Log.e("EQ31", "Gagal ubah gain", e) 
                }
            }
            fun release() { 
                dynamicsProcessing?.enabled = false
                dynamicsProcessing?.release() 
            }
        }

        @Composable
        fun EqualizerScreen(eqEngine: EqualizerEngine?) {
            val bandGains = remember { mutableStateListOf(*Array(31) { 0f }) }
            val scrollState = rememberScrollState()

            Column(
                modifier = Modifier.fillMaxSize().padding(16.dp), 
                horizontalAlignment = Alignment.CenterHorizontally
            ) {
                Text("DSP Equalizer 31-Band Pro", fontSize = 20.sp, color = Color.White, modifier = Modifier.padding(vertical = 16.dp))
                
                Row(
                    modifier = Modifier.fillMaxWidth().weight(1f).horizontalScroll(scrollState), 
                    horizontalArrangement = Arrangement.spacedBy(10.dp)
                ) {
                    ISO_31_BANDS.forEachIndexed { index, freq ->
                        val text = if (freq >= 1000f) "${(freq/1000f).toInt()}k" else "${freq.toInt()}"
                        Column(
                            horizontalAlignment = Alignment.CenterHorizontally, 
                            modifier = Modifier.width(50.dp).fillMaxHeight()
                        ) {
                            Text("${bandGains[index].toInt()} dB", fontSize = 10.sp, color = Color(0xFF00ADB5))
                            Box(modifier = Modifier.weight(1f), contentAlignment = Alignment.Center) {
                                Slider(
                                    value = bandGains[index],
                                    onValueChange = { 
                                        bandGains[index] = it
                                        eqEngine?.setBandGain(index, it) 
                                    },
                                    valueRange = -15f..15f,
                                    modifier = Modifier
                                        .graphicsLayer { rotationZ = -90f; transformOrigin = TransformOrigin(0.5f, 0.5f) }
                                        .layout { m, c ->
                                            val p = m.measure(Constraints(minWidth = c.minHeight, maxWidth = c.maxHeight, minHeight = c.minWidth, maxHeight = c.maxWidth))
                                            layout(p.height, p.width) { p.place(-((p.width - p.height) / 2), -((p.height - p.width) / 2)) }
                                        }
                                )
                            }
                            Text(text, fontSize = 11.sp, color = Color.LightGray)
                        }
                    }
                }
            }
        }
        EOF

    - name: Jalankan Perakit Bawaan Server
      run: gradle assembleDebug

    - name: Kirim File APK Jadi
      uses: actions/upload-artifact@v4
      with:
        name: Equalizer-31Band-Sukses
        path: app/build/outputs/apk/debug/app-debug.apk
